            let msgToSend = text;
            if (savedReply) {
                const rpRole = savedReply.role === 'ai' ? 'Marin' : 'You';
                msgToSend = `[Replying to ${rpRole}: "${savedReply.text.substring(0, 120)}"] ${text}`;
            }

            const marinDiv = addMessage('ai', '<span class="typing-dots"><span>.</span><span>.</span><span>.</span></span>');
            const contentSpan = marinDiv.querySelector('.bubble');

            try {
                const formData = new FormData();
                formData.append('message', msgToSend);
                formData.append('theme', localStorage.getItem('marinTheme') || 'evil');
                if (attachedImage) {
                    formData.append('image', attachedImage);
                }
                // Send document + page context for page-aware responses
                if (currentDocument) {
                    formData.append('document', currentDocument);
                    formData.append('page', isPdfMode ? String(currentPage) : '0');
                }
                const response = await fetch('/api/chat', { method: 'POST', body: formData });
                // BUG 5 fix: check HTTP status before reading body
                if (!response.ok) {
                    contentSpan.innerHTML = `<em>Error ${response.status}: ${response.statusText}</em>`;
                    chat.scrollTop = chat.scrollHeight;
                    return;
                }
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                contentSpan.innerHTML = '';
                let full = '';

                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    let chunk = decoder.decode(value);
                    full += chunk;

                    let display = full;
                    if (display.includes('__VIBE__')) display = display.replace(/__VIBE__\w+/g, '');
                    // Playground FIRST — before structured
                    if (display.includes('__PLAYGROUND__')) {
                        try {
                            const pgPart = display.split('__PLAYGROUND__')[1].split('\n')[0].trim();
                            const pgData = JSON.parse(pgPart);
                            display = display.split('__PLAYGROUND__')[0];
                            renderPlayground(pgData, contentSpan.closest('.bubble') || contentSpan.parentElement);
                        } catch { }
                    }
                    if (display.includes('__STRUCTURED__')) {
                        try {
                            const jsonPart = display.split('__STRUCTURED__')[1];
                            const parsed = JSON.parse(jsonPart);
                            if (parsed.content) display = parsed.content;
                        } catch { }
                    }
                    if (display.includes('__IMAGE__')) display = display.replace(/__IMAGE__\S*/g, '');

                    try {
                        contentSpan.innerHTML = DOMPurify.sanitize(marked.parse(display));
                    } catch {
                        contentSpan.innerHTML = DOMPurify.sanitize(display.replace(/\n/g, '<br>'));
                    }
                    renderMath(contentSpan);
                    chat.scrollTop = chat.scrollHeight;
                }
            } catch (err) {
                contentSpan.innerHTML += `<br><span style="color:var(--danger)">Error: ${escapeHtml(String(err))}</span>`;
            }
            attachedImage = null;
            document.getElementById('lib-attach-preview').innerHTML = '';
        };

            // Set selection color at viewport root so it cascades to all text layers
            if (viewport) viewport.style.setProperty('--selection-bg', saved.hl + '40');
            // Apply CSS filter to PDF canvas wrappers for dark/light inversion
            const wrappers = document.querySelectorAll('.pdf-page-wrapper');
            wrappers.forEach(w => {
                const canvas = w.querySelector('canvas');
                if (canvas) {
                    const r = parseInt(saved.bg.slice(1, 3), 16);
                    const g = parseInt(saved.bg.slice(3, 5), 16);
                    const b = parseInt(saved.bg.slice(5, 7), 16);
                    const brightness = (r * 299 + g * 587 + b * 114) / 1000;
                    if (brightness < 80) {
                        canvas.style.filter = 'invert(0.88) hue-rotate(180deg)';
                    } else {
                        canvas.style.filter = '';
                    }
                }
            });
            // Restore scroll position after reflow
            if (viewport) viewport.scrollTop = scrollY;

        // ── PDF scroll → page detection ──────────────────────────
        (function initPdfScrollDetection() {
            const vp = document.getElementById('pdf-viewport');
            let scrollTimer = null;
            vp.addEventListener('scroll', () => {
                if (scrollTimer) clearTimeout(scrollTimer);
                scrollTimer = setTimeout(detectCurrentPage, 100);
            });
            // Render pages near viewport via IntersectionObserver
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting && isPdfMode) {
                        const page = parseInt(entry.target.dataset.page);
                        if (page && !renderedPages.has(page)) {
                            renderPdfPage(page);
                        }
                    }
                });
            }, { root: vp, rootMargin: '400px' });
            // Observe future page wrappers via MutationObserver
            const mo = new MutationObserver((mutations) => {
                mutations.forEach(m => {
                    m.addedNodes.forEach(node => {
                        if (node.classList && node.classList.contains('pdf-page-wrapper')) {
                            observer.observe(node);
                        }
                    });
                });
            });
            mo.observe(vp, { childList: true });
        })();

                if (data.messages && data.messages.length > 0) {
                    data.messages.forEach(msg => {
                        const role = (msg.role === 'assistant' || msg.role === 'marin') ? 'ai' : 'user';
                        let content = msg.content || '';
                        // Skip tool context messages — they're for Marin, not displayed in chat
                        if (content.startsWith('[TOOL:') || content.startsWith('[USER MANUALLY EXECUTED TOOL]')) return;
                        if (content.includes('__VIBE__')) content = content.replace(/__VIBE__\w+/g, '').trim();
                        // Playground FIRST
                        if (content.includes('__PLAYGROUND__')) {
                            try {
                                const pgPart = content.split('__PLAYGROUND__')[1].split('\n')[0].trim();
                                const pgData = JSON.parse(pgPart);
                                content = content.split('__PLAYGROUND__')[0];
                                setTimeout(() => renderPlayground(pgData, null), 100);
                            } catch { }

                        if (content.includes('__STRUCTURED__')) {

                                if (parsed.content) content = parsed.content;

            e.preventDefault();
        });

        document.addEventListener('mousemove', (e) => {
            if (!isResizing) return;
            const container = document.querySelector('.container');
            const rect = container.getBoundingClientRect();
            const newWidth = rect.right - e.clientX;
            const clamped = Math.min(Math.max(newWidth, 300), window.innerWidth * 0.5);
            chatPanel.style.width = clamped + 'px';
        });

        document.addEventListener('mouseup', () => {
            if (isResizing) {
                isResizing = false;
                resizeHandle.classList.remove('active');
                document.body.style.cursor = '';
                document.body.style.userSelect = '';
            }
        });

        // ── Theme (Sweet / Evil) ──────────────────────────────────
        function libApplyTheme() {
            const theme = localStorage.getItem('marinTheme') || 'evil';
            const btn = document.getElementById('lib-theme-btn');
            const chatHeader = document.querySelector('.chat-header');
            const logoSub = document.getElementById('lib-logo-sub');
            if (theme === 'standard') {
                document.documentElement.setAttribute('data-theme', 'standard');
                if (btn) btn.textContent = 'Evil Mode';
                if (chatHeader) chatHeader.textContent = 'Chat with Marin HS-02';
                if (logoSub) logoSub.textContent = 'MARIN HS-02';
                document.title = 'Marin HS-02 \u2014 Library';
                marinAvatar = '/static/images/marin.png';
                document.querySelectorAll('img').forEach(img => {
                    if (img.src.includes('marin_evil.png')) img.src = '/static/images/marin.png';
                });
            } else {
                document.documentElement.removeAttribute('data-theme');
                if (btn) btn.textContent = 'Sweet Mode';
                if (chatHeader) chatHeader.textContent = 'Chat with Marin HS-04';
                if (logoSub) logoSub.textContent = 'MARIN HS-04';
                document.title = 'Marin HS-04 \u2014 Library';
                marinAvatar = '/static/images/marin_evil.png';
                document.querySelectorAll('img').forEach(img => {
                    if (img.src.includes('marin.png') && !img.src.includes('marin_evil.png')) img.src = '/static/images/marin_evil.png';
                });
            }
        }
        function libToggleTheme() {
            const current = localStorage.getItem('marinTheme') || 'evil';
            localStorage.setItem('marinTheme', current === 'evil' ? 'standard' : 'evil');
            libApplyTheme();
        }
        libApplyTheme();
    </script>

</body>

</html>
